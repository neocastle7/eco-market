<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMarket - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 py-4 bg-light">

    <div class="container d-flex flex-column align-items-center">
        <h1 class="mb-5 text-center">EcoMarket🍃</h1>
        
        <div class="w-100" style="max-width: 420px;">
            <h3 class="mb-4 text-center">Iniciar Sessão</h3>

            <form>
                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Endereço de E-mail</label>
                    <input type="email" class="form-control" id="inputEmail" name="inputEmail" placeholder="exemplo@email.com" required>
                </div>
                
                <div class="mb-2">
                    <label for="inputPassword" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="inputPassword" name="inputPassword" required>
                </div>

                <div class="mb-3 text-end">
                    <a href="#" class="link-primary text-decoration-none small">Esqueceu a senha?</a>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="checkRemember" name="checkRemember">
                    <label class="form-check-label" for="checkRemember">Lembrar de mim</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>

                <div class="text-center mt-3">
                    <label for="registerAccess" class="form-label mb-0 me-1">Não tem uma conta?</label>
                    <a href="#" class="link-primary text-decoration-none fw-bold" id="registerAccess">Clique aqui.</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
