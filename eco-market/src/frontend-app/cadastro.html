<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMarket - Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 py-4 bg-light">

    <div class="container d-flex flex-column align-items-center">
        <h1 class="mb-5 text-center">EcoMarket🍃</h1>
        
        <div class="w-100" style="max-width: 420px;">
            <h3 class="mb-4 text-center">Cadastro de Usuário</h3>

            <form>
                <div class="mb-3">
                    <label for="inputName" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="inputName" name="inputName" placeholder="Digite seu nome completo" required>
                </div>

                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Endereço de E-mail</label>
                    <input type="email" class="form-control" id="inputEmail" name="inputEmail" aria-describedby="emailHelp" placeholder="exemplo@email.com" required>
                    <div id="emailHelp" class="form-text">Nunca compartilharemos seu e-mail com ninguém.</div>
                </div>

                <div class="mb-3">
                    <label for="inputPassword" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="inputPassword" name="inputPassword" aria-describedby="passwordHelpBlock" required>
                    <div id="passwordHelpBlock" class="form-text">
                        Sua senha deve ter de 8 a 20 caracteres, conter letras e números e não deve conter espaços, caracteres especiais ou emoji.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="inputConfirmPassword" class="form-label">Confirmar Senha</label>
                    <input type="password" class="form-control" id="inputConfirmPassword" name="inputConfirmPassword" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Cadastrar</button>

                <div class="text-center mt-3">
                    <label for="loginAcess" class="form-label mb-0 me-1">Já tem uma conta?</label>
                    <a href="#" class="link-primary text-decoration-none fw-bold" id="loginAcess">Clique aqui.</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
