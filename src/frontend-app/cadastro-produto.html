<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMarket - Cadastro de Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    
<nav class="navbar navbar-dark bg-success mb-4">
    <div class="container">
        <span class="navbar-brand">
            🌱 EcoMarket
        </span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        EcoMarket 🍃
    </h1>

    <div class="card shadow">

        <div class="card-header">
            Cadastro de Produto
        </div>

        <div class="card-body">

            <form id="formProduto">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" id="nome" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço</label>
                    <input type="number" step="0.01" id="preco" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Estoque</label>
                    <input type="number" id="estoque" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pontos de Reciclagem</label>
                    <input type="number" id="pontos" class="form-control">
                </div>

                <div class="mb-3">
                     <label class="form-label">Créditos de Carbono</label>
                     <input type="number" id="carbono" class="form-control">
                </div>

                <button class="btn btn-success w-100">
                    Salvar Produto
                </button>

                <a href="listagem-produtos.html"
                   class="btn btn-outline-success w-100 mt-2">
                    Ver Produtos
                </a>

            </form>

        </div>

    </div>

</div>

<script src="../js/produtos.js"></script>

</body>
</html>
